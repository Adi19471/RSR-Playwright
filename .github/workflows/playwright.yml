name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}
jobs:
  test:
    timeout-minutes: 60
    runs-on: self-hosted
    env:
      CI: true
      BASE_URL: ${{ secrets.BASE_URL }}
      RSR_USERNAME: ${{ secrets.RSR_USERNAME }}
      RSR_PASSWORD: ${{ secrets.RSR_PASSWORD }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium firefox webkit msedge chrome
    - name: Check secrets are wired (prints lengths only, never values)
      shell: powershell
      run: |
        Write-Host "BASE_URL length: $("$env:BASE_URL".Length)"
        Write-Host "RSR_USERNAME length: $("$env:RSR_USERNAME".Length)"
        Write-Host "RSR_PASSWORD length: $("$env:RSR_PASSWORD".Length)"
    - name: Run Playwright tests
      run: npx playwright test
    - name: Generate Allure report
      if: ${{ !cancelled() }}
      run: npm run allure:generate
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30
